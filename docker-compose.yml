version: '3.8'

services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ./volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.10
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.5
    ports:
      - "8000:3000"
    environment:
      MILVUS_URL: standalone:19530
    depends_on:
      - standalone

  # 新增 Prometheus 服务（正确位置：在 services 下面）
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
      - ./business_alerts.yml:/etc/prometheus/business_alerts.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    # depends_on 可选，如果需要等待其他服务（如 standalone）可取消注释
    # depends_on:
    #   - standalone

  java-app:
    build: .
    container_name: oncall-java
    ports:
      - "9900:9900"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - TENCENT_CLS_SECRET_ID=${TENCENT_CLS_SECRET_ID}
      - TENCENT_CLS_SECRET_KEY=${TENCENT_CLS_SECRET_KEY}
      - TENCENT_CLS_TOPIC_ID=${TENCENT_CLS_TOPIC_ID}
      - SPRING_AI_DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - standalone
      - prometheus
    networks:
      - default

  python-agent:
    build: D:/Dev/MyPythonScript/aiops-python-agents   # 请确认此路径正确
    container_name: aiops-python
    ports:
      - "5000:5000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - JAVA_BACKEND_URL=http://java-app:9900
    depends_on:
      - java-app
    networks:
      - default

networks:
  default:
    name: milvus