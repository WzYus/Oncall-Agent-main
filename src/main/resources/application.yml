server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: localhost
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000

spring:
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeEmbeddingAutoConfiguration
  ai:
    dashscope:
      api-key: local-dummy-key
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen3.5:9b
      embedding:
        model: bge-m3
        enabled: true

dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:}

document:
  chunk:
    max-size: 800
    overlap: 100

rag:
  top-k: 3
  model: "qwen3.5:9b"

prometheus:
  base-url: http://host.docker.internal:9090
  timeout: 10
  mock-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  metrics:
    tags:
      application: ${spring.application.name:oncall-agent}

cls:
  mock-enabled: false
  secret-id: ${TENCENT_CLS_SECRET_ID:}
  secret-key: ${TENCENT_CLS_SECRET_KEY:}
  region: ap-chongqing
  topic-id: f4b49851-84ce-4e43-9f3b-e5c34fafcdfd

agent:
  python:
    url: http://localhost:5000