server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: localhost           # 容器化后使用服务名
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000

# Spring AI Alibaba DashScope 配置
spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-turbo
          timeout: 180000
      retry:
        max-attempts: 3
        backoff:
          initial-interval: 2000
          multiplier: 2
          max-interval: 10000
    mcp:
      client:
        enabled: true
        name: tencent-mcp-server
        version: 1.0.0
        request-timeout: 60s
        type: ASYNC
        stdio:
          command: "npx"
          args: [ "-y", "cls-mcp-server@latest" ]
          env:
            TRANSPORT: "stdio"
            TENCENTCLOUD_SECRET_ID: ${TENCENT_CLS_SECRET_ID:}
            TENCENTCLOUD_SECRET_KEY: ${TENCENT_CLS_SECRET_KEY:}
            TENCENTCLOUD_API_BASE_HOST: "tencentcloudapi.com"
            TENCENTCLOUD_REGION: "ap-chengdu"
            MAX_LENGTH: "15000"

dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:}
  embedding:
    model: text-embedding-v4

document:
  chunk:
    max-size: 800
    overlap: 100

rag:
  top-k: 3
  model: "qwen3-max"

prometheus:
  base-url: http://host.docker.internal:9090    # 容器内使用服务名
  timeout: 10
  mock-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  metrics:
    tags:
      application: ${spring.application.name:oncall-agent}

cls:
  mock-enabled: true                  # 暂时保持 Mock，后续改为 false 并配置真实凭证
  secret-id: ${TENCENT_CLS_SECRET_ID:}
  secret-key: ${TENCENT_CLS_SECRET_KEY:}
  region: ap-guangzhou
  topic-id: ${TENCENT_CLS_TOPIC_ID:}

agent:
  python:
    url: http://localhost:5000     # 容器内使用服务名